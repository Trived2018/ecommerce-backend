server.port=8081
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.main.allow-circular-references=true
spring.jpa.open-in-view=false

twilio.account.sid=${TWILIO_ACCOUNT_SID:dummy_sid}
twilio.auth.token=${TWILIO_AUTH_TOKEN:dummy_token}
twilio.phone.number=${TWILIO_PHONE_NUMBER:dummy_phone}
twilio.verify.service.sid=${TWILIO_VERIFY_SERVICE_SID:dummy_service_sid}
