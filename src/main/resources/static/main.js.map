<div class="container">

   <div class="product-grid">
      <article class="product-card" *ngFor="let p of productDetails">
         <div class="card-image-wrap">
            <img
               class="product-image"
               [src]="p.productImages[0]?.url"
               alt="Product: {{ p.productName }}">
         </div>

         <div class="card-content">
            <h3 class="product-name">{{ p.productName }}</h3>
            <p class="product-short-description">{{ p.productDescription }}</p>

            <div class="price-row">
               <span class="current-price">Rs. {{ p.productDiscountedPrice }}</span>
               <span class="old-price" *ngIf="p.productActualPrice > p.productDiscountedPrice">Rs. {{ p.productActualPrice }}</span>
            </div>

            <div class="card-actions">
               <button class="btn btn-secondary" type="button" (click)="showProductDetails(p.productId)">View Details</button>
               <button class="btn btn-primary" type="button" (click)="addToCart(p.productId)">Add to Cart</button>
            </div>
         </div>
      </article>
   </div>

   <div class="text-center mt-5 pb-space" *ngIf="showLoadButton">
      <button type="button" class="load-more-btn" (click)="loadMoreProduct()">Load more</button>
   </div>
   <div class="mt-5 pb-space">
      
   </div>
</div>
